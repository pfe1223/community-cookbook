name: Build Cookbook PDF
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Check all recipes are registered in manifest.yml
        run: python check_manifest.py

      - name: Merge Markdown Files
        run: python build_book.py

      - name: Install Pandoc and LaTeX Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra texlive-xetex

      - name: Build PDF
        run: |
          pandoc combined_cookbook.md -o cookbook.pdf \
            --toc \
            --pdf-engine=xelatex \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=cyan \
            -V mainfont="DejaVu Serif" \
            -V sansfont="DejaVu Sans"

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: community-cookbook
          path: cookbook.pdf

      - name: Commit updated files back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build cookbook.pdf and combined_cookbook.md [skip ci]"
          file_pattern: "combined_cookbook.md cookbook.pdf"